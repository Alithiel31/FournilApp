# Orchestration complète : base de données, API, frontend PWA.
#   docker compose up --build
# Accès public prévu : https://fournilapp.alithiel31.dev (Cloudflare Tunnel → frontend)
# Accès direct sur le Pi (debug) : http://caesura:3002 · API : http://caesura:3003
# (ports décalés : 3000/3001/5433 déjà pris par d'autres projets sur ce Pi —
#  voir `docker ps`)
#
# Convention alignée sur QcWeather : Dockerfiles en stages nommés
# deps/development/build/production, target: production explicite,
# secrets du backend dans backend/.env (hors du compose, hors git).
# Différence assumée : le frontend reste servi par Node (adapter-node,
# SSR + form actions), pas par nginx statique comme QcWeather.
#
# POSTGRES_PASSWORD vient du .env à la racine (copier .env.example → .env,
# hors git comme backend/.env). Doit matcher le mot de passe dans
# backend/.env (DATABASE_URL).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fournil
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?définis POSTGRES_PASSWORD dans un .env à la racine}
      POSTGRES_DB: fournil
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fournil"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      target: production
    env_file:
      - ./backend/.env
    ports:
      - "3003:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: production
    environment:
      API_URL: http://backend:3001
      PORT: 3000
      # ORIGIN sert à la protection CSRF de SvelteKit : doit correspondre à
      # l'URL publique réelle. Une fois le Cloudflare Tunnel branché sur ce
      # domaine, c'est la seule origine acceptée pour les formulaires
      # (commandes, import) — l'accès direct http://caesura:3002 continuera
      # d'afficher les pages mais les soumissions de formulaire seront
      # rejetées (403) tant qu'on n'y accède pas via ce domaine.
      ORIGIN: https://fournilapp.alithiel31.dev
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  pgdata:
